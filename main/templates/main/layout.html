{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gillian Bevan Fuel Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'img/icon.ico' %}">
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'img/icon.ico' %}">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{% url 'main:index' %}" aria-label="Gillian Bevan Fuel Tracker home">
            <img class="brand-logo" src="{% static 'img/logo.png' %}" width="180" height="62" alt="Gillian Bevan Fuel &amp; Lubricants Supply">
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
            <a href="{% url 'main:shift_start' %}">Manager</a>
            <a href="{% url 'main:dashboard' %}">Admin</a>
            <a href="{% url 'main:reports' %}">Reports</a>
        </nav>
    </header>

    <main class="page-shell">
        {% if messages %}
            <div class="messages" aria-live="polite">
                {% for message in messages %}
                    <div class="message message-{{ message.tags|default:'info' }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
